name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload assets to
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: remotext-linux-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: remotext-macos-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: remotext-macos-aarch64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: remotext-windows-x86_64
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/remotext" package/remotext
          chmod +x package/remotext
          tar -C package -czf "dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}" remotext
          shasum -a 256 "dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}" > "dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}.sha256"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist, package
          Copy-Item "target/${{ matrix.target }}/release/remotext.exe" "package/remotext.exe"
          Compress-Archive -Path "package/remotext.exe" -DestinationPath "dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}" -Force
          $hash = Get-FileHash "dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}" -Algorithm SHA256
          "$($hash.Hash.ToLower())  ${{ matrix.asset_name }}.${{ matrix.archive_ext }}" | Out-File -Encoding ascii "dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
          files: dist/*
